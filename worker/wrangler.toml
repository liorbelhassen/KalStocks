name = "kalstocks-vision"
main = "worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Reliable crons (fire on time, unlike GitHub Actions):
#  - every 5 min: price poll
#  - 06:00/07:00 UTC → 09:00 Israel morning brief (+email); 10:00/11:00 UTC → 13:00 Israel midday
#    refresh. The job gates by Israel hour (9 or 13), so the extra UTC slot covers DST.
[triggers]
crons = ["*/5 * * * *", "0 6 * * MON-FRI", "0 7 * * MON-FRI", "0 10 * * MON-FRI", "0 11 * * MON-FRI"]

# Deploy:  cd worker && wrangler deploy
# Secrets: wrangler secret put GEMINI_API_KEY
#          wrangler secret put OPENAI_API_KEY   # optional — fallback when Gemini's free tier is out
#          wrangler secret put SERVICE_ACCOUNT < ../serviceAccount.json
#          wrangler secret put RESEND_API_KEY
#          wrangler secret put DIGEST_TO
