name: morning-brief

# Dashboard AI insight refresh twice a day (Israel): ~09:00 morning brief (+email) and
# ~13:00 midday update (dashboard only). 09:00 IDT = 06:00 UTC, 13:00 IDT = 10:00 UTC.
on:
  # Scheduling moved to the Cloudflare Worker cron (reliable 09:00). Kept for manual runs / backup.
  workflow_dispatch: {}

jobs:
  morning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Send morning brief
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          DIGEST_FROM: ${{ secrets.DIGEST_FROM }}
        run: node scripts/morning.mjs
