name: poll-prices

# Free scheduler (replaces a Blaze Cloud Function). Cron is UTC; the window 06–15 UTC
# covers TASE hours (Sun–Thu, 09:30–17:15 Israel = 06:30–14:15 UTC in summer / +1h winter).
# scripts/poll.mjs double-checks Israel-time trading hours before writing, so off-hours runs
# exit immediately without touching Firestore. NOTE: GitHub scheduled crons are best-effort and
# can be delayed several minutes under load — expect ~5–15 min freshness, not exact 5-min ticks.
on:
  schedule:
    # 06–21 UTC covers TASE (Sun–Thu) + US markets (Mon–Fri); poll.mjs gates the exact hours.
    - cron: '*/5 6-21 * * 0-5'
  workflow_dispatch: {} # manual "Run workflow" button (also lets you force a poll)

jobs:
  poll:
    runs-on: ubuntu-latest
    concurrency:
      group: poll-prices
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Poll prices
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/poll.mjs
