name: email-digest

# Twice daily (Israel time): ~13:00 mid-session and ~18:00 post-close, Sun–Thu.
# Cron is UTC (13:00 IDT = 10:00 UTC, 18:00 IDT = 15:00 UTC).
on:
  schedule:
    - cron: '0 10,15 * * 0-4'
  workflow_dispatch: {}

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Send digest
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          DIGEST_FROM: ${{ secrets.DIGEST_FROM }}
        run: node scripts/digest.mjs
